<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#182b3a">
  <title>Kevin’s Business Numbers</title>
  <style>

:root{--ink:#17202a;--muted:#667085;--line:#e5e7eb;--paper:#fff;--bg:#f3f5f4;--green:#246b4b;--green2:#e8f3ed;--amber:#d99027;--navy:#182b3a;--danger:#b42318}

*{box-sizing:border-box}
 body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button,input{font:inherit}
button{cursor:pointer}
.appShell{min-height:100vh}
header{height:86px;padding:0 max(24px,calc((100vw - 1120px)/2));display:flex;align-items:center;justify-content:space-between;background:var(--navy);color:#fff}
header h1{font-size:22px;margin:3px 0 0}
.eyebrow,.kicker{font-size:11px;font-weight:800;letter-spacing:.13em}
.eyebrow{color:#99b0bf}
.headerRate{display:flex;align-items:center;gap:8px}
.headerRate>span{font-size:12px;color:#b9c7d0}
.headerRate strong{font-size:20px}
nav{height:58px;background:#fff;border-bottom:1px solid var(--line);display:flex;justify-content:center;gap:8px;position:sticky;top:0;z-index:20}
nav button{border:0;background:none;padding:0 20px;color:var(--muted);font-weight:700;border-bottom:3px solid transparent}
nav button.active{color:var(--green);border-bottom-color:var(--green)}
main{max-width:1120px;margin:auto;padding:28px 20px 110px}
.loading{padding:60px}
.heroCard{background:linear-gradient(135deg,var(--navy),#25475a);color:#fff;border-radius:20px;padding:30px 34px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 12px 36px #162c3a25}
.heroCard .kicker{color:#afd4bd}
.heroCard h2{font-size:48px;line-height:1;margin:9px 0}
.heroCard h2 small{font-size:16px;color:#c4d1d8}
.heroCard p{margin:0;color:#d3dde2}
.primary,.secondary,.textButton{border:0;border-radius:10px;font-weight:800}
.primary{background:var(--green);color:#fff;padding:12px 18px}
.heroCard .primary{background:#fff;color:var(--navy)}
.primary.big{padding:16px 25px}
.primary.full{width:100%;margin-top:18px}
.secondary{background:#fff;border:1px solid var(--line);padding:10px 14px;color:var(--ink)}
.textButton{background:none;color:var(--green);padding:8px}
.metricGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}
.metricGrid article{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px}
.metricGrid span,.metricGrid strong{display:block}
.metricGrid span{font-size:12px;color:var(--muted);margin-bottom:10px}
.metricGrid strong{font-size:20px}
.panel,.quoteSection{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:16px}
.panelHead,.quoteIntro,.settingsHead{display:flex;justify-content:space-between;align-items:center;gap:20px}
.panelHead h2,.panelHead h3,.quoteIntro h2,.settingsHead h2{margin:4px 0}
.panelHead p,.quoteIntro p,.settingsHead p{margin:0;color:var(--muted);font-size:14px}
.tipWrap{position:relative;display:inline-flex;margin-left:5px;vertical-align:middle}
.tipButton{width:19px;height:19px;border-radius:50%;border:1px solid #bac3cc;background:#fff;color:#586574;font-weight:900;font-size:11px;padding:0}
.tipBubble{position:absolute;left:50%;bottom:calc(100% + 9px);transform:translateX(-50%);width:250px;background:var(--navy);color:#fff;padding:10px 12px;border-radius:8px;font-size:12px;font-weight:500;line-height:1.45;opacity:0;visibility:hidden;transition:.15s;z-index:60;box-shadow:0 8px 25px #0003}
.tipWrap:hover .tipBubble,.tipWrap:focus-within .tipBubble{opacity:1;visibility:visible}
.tipWrap:focus-within .tipBubble{pointer-events:auto}
label{font-size:12px;color:var(--muted);font-weight:700;display:flex;align-items:center;margin-bottom:6px}
.field>input,.field>.prefix,.field>.suffix,.field>select,input.search{width:100%}
input{border:1px solid #ccd2d8;background:#fff;border-radius:9px;min-height:44px;padding:10px 12px;color:var(--ink);font-size:16px}
input:focus{outline:3px solid #7eb79a40;border-color:var(--green)}
input:disabled{background:#f1f3f4;color:#45515b}
.prefix,.suffix{display:flex;border:1px solid #ccd2d8;border-radius:9px;background:#fff;align-items:center;overflow:hidden}
.prefix span,.suffix span{padding:0 10px;color:var(--muted);font-weight:700}
.prefix input,.suffix input{border:0;border-radius:0;min-width:0}
.prefix:focus-within,.suffix:focus-within{outline:3px solid #7eb79a40;border-color:var(--green)}
.quoteIntro{margin-bottom:18px}
.templateStrip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.templateStrip button{background:#fff;border:1px solid var(--line);border-radius:13px;padding:15px;text-align:left}
.templateStrip b,.templateStrip span{display:block}
.templateStrip span{font-size:12px;color:var(--muted);margin-top:4px}
.templateStrip button:hover{border-color:var(--green);background:var(--green2)}
.jobDetails{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.quoteLayout{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:18px;align-items:start}
.priceCard{position:sticky;top:80px;background:var(--navy);color:#fff;border-radius:18px;padding:24px}
.priceCard>.kicker{color:#a8cfb7}
.priceCard>strong{display:block;font-size:40px;line-height:1.1;margin-top:7px}
.gstLine{color:#b9c7d0;font-size:13px}
.priceBreakdown{border-top:1px solid #ffffff26;margin-top:18px;padding-top:10px}
.priceLine{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:7px 0;color:#c8d3da;font-size:13px}
.priceLine b{color:#fff}
.priceLine.strong{border-top:1px solid #ffffff26;margin-top:6px;padding-top:13px;font-size:14px}
.priceCard .tipButton{background:transparent;color:#fff;border-color:#8ca0ac}
.autosave{text-align:center;color:#9fb0bb;font-size:11px;margin:10px 0 0}
.quoteSection{padding:0;overflow:visible}
.sectionToggle{width:100%;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;text-align:left}
.sectionTitle{display:flex;align-items:center}
.sectionTitle>button,.sectionValue{border:0;background:none;font-weight:800;padding:5px}
.sectionValue{display:flex;align-items:center;gap:10px}
.sectionToggle i{width:28px;height:28px;border-radius:50%;background:#f1f4f2;color:var(--green);display:grid;place-items:center;font-style:normal;font-size:20px}
.sectionBody{border-top:1px solid var(--line);padding:14px}
.itemCard{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;background:#fbfcfb}
.itemTop{display:flex;gap:8px;align-items:center}
.itemName{border:0;background:transparent;font-weight:800;flex:1;padding-left:4px}
.delete,.close{width:38px;height:38px;border:0;border-radius:9px;background:#fff0ef;color:var(--danger);font-size:21px}
.itemFields{display:grid;grid-template-columns:80px 80px 1.3fr 1fr 110px;gap:9px;align-items:end;margin-top:8px}
.labourFields{display:grid;grid-template-columns:1fr 1.5fr 130px;gap:9px;align-items:end;margin-top:8px}
.lineTotal{padding:0 4px 8px;text-align:right}
.lineTotal span,.lineTotal strong{display:block}
.lineTotal span{font-size:11px;color:var(--muted);margin-bottom:5px}
.addBar{display:flex;gap:8px;justify-content:space-between}
.addLine{margin-top:5px}
.costRow,.expenseRow{display:grid;grid-template-columns:1fr 160px 40px;gap:8px;margin-bottom:8px}
.advanced h3{margin-top:0}
.twoCols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mobilePrice{display:none}
.empty{padding:36px 15px;text-align:center;color:var(--muted);font-size:14px}
.empty.compact{padding:18px}
.jobRow{display:flex;align-items:center;border-top:1px solid var(--line);padding:12px 0}
.jobMain{display:flex;justify-content:space-between;align-items:center;flex:1;border:0;background:none;text-align:left;padding:5px}
.jobMain span strong,.jobMain span small{display:block}
.jobMain span small{color:var(--muted);margin-top:4px}
.jobMain>b{font-size:18px}
.jobActions{display:flex;gap:3px}
.jobActions button{border:0;background:none;color:var(--green);padding:8px;font-weight:700}
.jobActions .dangerText{color:var(--danger)}
.settingsHead{margin-bottom:18px}
.saveBadge{background:var(--green2);color:var(--green);padding:8px 12px;border-radius:30px;font-size:12px;font-weight:800}
.settingsGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.calculationStrip{display:grid;grid-template-columns:repeat(3,1fr);background:#f2f6f3;border-radius:12px;margin-top:18px;padding:14px;gap:10px}
.calculationStrip span,.calculationStrip strong{display:block}
.calculationStrip span{font-size:11px;color:var(--muted);margin-bottom:4px}
.expenseList{margin-top:16px}
.toggle{display:flex;align-items:center;gap:10px;margin:0;color:var(--ink);font-size:14px}
.toggle input{position:absolute;opacity:0}
.toggle span{width:48px;height:27px;border-radius:20px;background:#c6ccd1;position:relative}
.toggle span:after{content:"";position:absolute;width:21px;height:21px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.2s}
.toggle input:checked+span{background:var(--green)}
.toggle input:checked+span:after{left:24px}
.modalBackdrop{position:fixed;inset:0;background:#0a1722aa;display:grid;place-items:center;padding:16px;z-index:100}
.modal{background:#fff;width:min(620px,100%);max-height:85vh;border-radius:18px;padding:20px;display:flex;flex-direction:column}
.modalHead{display:flex;justify-content:space-between}
.modalHead h2{margin:0}
.modalHead p{margin:4px 0 15px;color:var(--muted);font-size:13px}
.materialPicker{overflow:auto;margin-top:10px}
.materialPicker button{width:100%;display:flex;justify-content:space-between;align-items:center;text-align:left;padding:13px;border:0;border-bottom:1px solid var(--line);background:#fff}
.materialPicker button:hover{background:var(--green2)}
.materialPicker strong,.materialPicker span{display:block}
.materialPicker span{color:var(--muted);font-size:12px;margin-top:3px}


@media(max-width:850px){header{padding:0 18px}
.headerRate>span{display:none}
main{padding:20px 14px 110px}
.metricGrid{grid-template-columns:1fr 1fr}
.templateStrip{grid-template-columns:1fr 1fr}
.quoteLayout{display:block}
.priceCard{display:none}
.mobilePrice{display:flex;position:fixed;left:0;right:0;bottom:0;background:var(--navy);color:#fff;padding:10px 14px;align-items:center;justify-content:space-between;z-index:40;box-shadow:0 -5px 25px #0003}
.mobilePrice span,.mobilePrice strong{display:block}
.mobilePrice span{font-size:11px;color:#b9c7d0}
.mobilePrice strong{font-size:18px}
.settingsGrid{grid-template-columns:1fr 1fr}
.itemFields{grid-template-columns:1fr 1fr}
.itemFields .lineTotal{grid-column:1/-1}
.labourFields{grid-template-columns:1fr 1fr}
.labourFields .lineTotal{grid-column:1/-1}
.tipBubble{position:fixed;left:16px;right:16px;bottom:80px;transform:none;width:auto;text-align:left}
}

@media(max-width:540px){header{height:72px}
header h1{font-size:17px}
.eyebrow{font-size:9px}
.headerRate strong{font-size:15px}
nav{justify-content:flex-start;overflow-x:auto;height:54px}
nav button{padding:0 16px;white-space:nowrap;font-size:13px}
.heroCard{padding:22px;display:block}
.heroCard h2{font-size:38px}
.heroCard .primary{width:100%;margin-top:20px}
.metricGrid{grid-template-columns:1fr 1fr;gap:8px}
.metricGrid article{padding:14px}
.metricGrid strong{font-size:16px}
.templateStrip{display:flex;overflow-x:auto;padding-bottom:4px}
.templateStrip button{min-width:145px}
.jobDetails,.twoCols,.settingsGrid,.calculationStrip{grid-template-columns:1fr}
.panel,.quoteSection{border-radius:13px}
.panel{padding:16px}
.quoteIntro{align-items:flex-start}
.quoteIntro p{max-width:270px}
.itemFields,.labourFields{grid-template-columns:1fr 1fr}
.costRow,.expenseRow{grid-template-columns:1fr 120px 38px}
.addBar{flex-direction:column}
.addBar button{width:100%}
.jobRow{align-items:flex-start}
.jobMain{display:block}
.jobMain>b{display:block;margin-top:8px}
.jobActions{flex-direction:column}
.panelHead{align-items:flex-start}
.panelHead>.primary{white-space:nowrap}
.settingsHead{align-items:flex-start}
.saveBadge{white-space:nowrap;font-size:10px}
.modal{padding:15px}
.tipButton{width:22px;height:22px}
}

@media print{nav,.mobilePrice,.primary,.secondary,.textButton,.delete,.jobActions{display:none!important}
body{background:#fff}
header{background:#fff;color:#000;padding:0;height:60px}
.quoteLayout{display:block}
.priceCard{display:block;position:static;color:#000;background:#fff;border:2px solid #000}
.priceCard *{color:#000!important}
}
</style>
</head>
